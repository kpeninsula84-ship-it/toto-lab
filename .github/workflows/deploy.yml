name: Deploy toto-lab

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-toto-lab
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted, vps]
    timeout-minutes: 20
    steps:
      - name: Run deploy.sh on the VPS
        # deploy.sh handles git pull, conditional npm install (functions/worker),
        # and `firebase deploy`. Worker code on disk is picked up by the next
        # totolab-worker.timer firing automatically.
        run: /root/deploy.sh toto-lab
