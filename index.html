<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TotoLab — EPL 베팅 분석</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, getDoc, getDocs, doc, query, orderBy, where } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyASY-tE9WfcUzFoZ3vCy5lQOX0m5g61A5A",
      authDomain: "toto-lab.firebaseapp.com",
      projectId: "toto-lab",
      storageBucket: "toto-lab.firebasestorage.app",
      messagingSenderId: "66411451289",
      appId: "1:66411451289:web:85fd3c02a5c7f942caf908",
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    async function loadStats() {
      const container = document.getElementById("stats");
      try {
        const snap = await getDoc(doc(db, "stats", "summary"));
        if (!snap.exists()) {
          container.innerHTML = "";
          return;
        }
        const s = snap.data();
        if (s.totalPicks === 0) {
          container.innerHTML = `
            <p class="text-gray-500 text-sm text-center py-4">아직 결과 기록된 픽 없음</p>`;
          return;
        }
        const byType = Object.entries(s.byPickType || {})
          .map(
            ([type, v]) =>
              `<span class="px-2 py-1 bg-gray-800 rounded text-xs">${PICK_LABEL[type] || type}: ${v.wins}/${v.count}</span>`
          )
          .join(" ");
        const roiColor = s.roi > 0 ? "text-green-400" : s.roi < 0 ? "text-red-400" : "text-gray-400";
        container.innerHTML = `
          <h3 class="text-lg font-bold text-white mb-3">📈 누적 성적</h3>
          <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
            <div class="bg-gray-800 rounded p-3">
              <p class="text-xs text-gray-400">총 픽</p>
              <p class="text-xl font-bold text-white">${s.totalPicks}</p>
            </div>
            <div class="bg-gray-800 rounded p-3">
              <p class="text-xs text-gray-400">적중률</p>
              <p class="text-xl font-bold text-white">${s.winRate}% <span class="text-xs text-gray-400">(${s.wins}W ${s.losses}L)</span></p>
            </div>
            <div class="bg-gray-800 rounded p-3">
              <p class="text-xs text-gray-400">순손익 (1,000원 기준)</p>
              <p class="text-xl font-bold ${roiColor}">${s.totalProfit >= 0 ? "+" : ""}${s.totalProfit.toLocaleString()}원</p>
            </div>
            <div class="bg-gray-800 rounded p-3">
              <p class="text-xs text-gray-400">ROI</p>
              <p class="text-xl font-bold ${roiColor}">${s.roi >= 0 ? "+" : ""}${s.roi}%</p>
            </div>
          </div>
          ${byType ? `<div class="mt-3 flex flex-wrap gap-2">${byType}</div>` : ""}
        `;
      } catch (err) {
        container.innerHTML = `<p class="text-red-400 text-sm text-center py-4">통계 로딩 실패: ${err.message}</p>`;
      }
    }

    async function loadRecommendations() {
      const container = document.getElementById("recommendations");
      try {
        const snap = await getDoc(doc(db, "recommendations", "current"));
        if (!snap.exists()) {
          container.innerHTML = `<p class="text-gray-500 text-sm text-center py-4">추천 데이터 없음. 다음 분석 스케줄 대기 중.</p>`;
          return;
        }
        const rec = snap.data();

        if (rec.pickCount === 0) {
          container.innerHTML = `
            <div class="bg-yellow-900/30 border border-yellow-700 rounded-lg p-5">
              <h3 class="text-lg font-bold text-yellow-300 mb-2">🟡 이번엔 베팅 패스 권고</h3>
              <p class="text-sm text-gray-300">
                분석 ${rec.totalAnalyzed}경기 중 기준(Edge ≥ ${rec.threshold.edge}%, Confidence ≥ ${rec.threshold.confidence}) 통과 0개.
                시장이 효율적으로 형성됐거나 데이터 불확실성이 큽니다.
              </p>
            </div>`;
          return;
        }

        const picksHtml = rec.picks
          .map((p, i) => {
            const kickoff = p.kickoff.toDate
              ? p.kickoff.toDate()
              : new Date(p.kickoff);
            return `
              <div class="bg-gray-800 border border-green-600/50 rounded-lg p-4 flex items-start gap-3">
                <div class="text-2xl font-bold text-green-400 w-8">${i + 1}</div>
                <div class="flex-1">
                  <p class="text-xs text-gray-400">${kickoff.toLocaleString("ko-KR", { month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" })}</p>
                  <h4 class="text-white font-semibold">${p.home} vs ${p.away}</h4>
                  <p class="text-green-400 text-sm mt-1">
                    <strong>${p.pickLabel}</strong> @${p.odds}
                    <span class="text-gray-400 ml-2">· EV ${p.ev >= 0 ? "+" : ""}${p.ev}% · Edge +${p.edge}% · Conf ${p.confidence}</span>
                  </p>
                </div>
              </div>`;
          })
          .join("");

        const comboInfo = rec.comboOdds
          ? `<p class="text-sm text-gray-400 mt-3">참고: ${rec.pickCount}픽 조합 배당 <strong class="text-green-400">${rec.comboOdds}x</strong> (5,000원 적중 시 ${Math.round(5000 * rec.comboOdds).toLocaleString()}원)</p>`
          : `<p class="text-sm text-gray-400 mt-3">참고: 단독 베팅 추천</p>`;

        container.innerHTML = `
          <div class="mb-3 flex justify-between items-baseline">
            <h3 class="text-lg font-bold text-white">🎯 추천 (${rec.pickCount}경기)</h3>
            <p class="text-xs text-gray-500">분석 ${rec.totalAnalyzed} · 통과 ${rec.totalPassed}</p>
          </div>
          <div class="space-y-2">${picksHtml}</div>
          ${comboInfo}
        `;
      } catch (err) {
        container.innerHTML = `<p class="text-red-400 text-sm text-center py-4">추천 로딩 실패: ${err.message}</p>`;
      }
    }

    async function loadMatches() {
      const container = document.getElementById("matches");
      container.innerHTML = `<p class="text-gray-400 text-center py-12">데이터 수집 대기 중...</p>`;

      try {
        const q = query(collection(db, "matches"), orderBy("kickoff", "asc"));
        const snap = await getDocs(q);

        if (snap.empty) {
          container.innerHTML = `<p class="text-gray-400 text-center py-12">아직 분석된 경기가 없습니다. 스케줄러가 돌면 여기에 나타납니다.</p>`;
          return;
        }

        container.innerHTML = "";
        snap.forEach((doc) => {
          const m = doc.data();
          container.appendChild(renderMatchCard(m));
        });
      } catch (err) {
        container.innerHTML = `<p class="text-red-400 text-center py-12">로딩 실패: ${err.message}</p>`;
      }
    }

    const PICK_LABEL = {
      home: "홈 승",
      draw: "무승부",
      away: "원정 승",
      over25: "2.5 오버",
      under25: "2.5 언더",
    };

    function formatKickoff(ts) {
      if (!ts) return "-";
      const date = ts.toDate ? ts.toDate() : new Date(ts);
      return date.toLocaleString("ko-KR", {
        month: "short",
        day: "numeric",
        hour: "2-digit",
        minute: "2-digit",
      });
    }

    function confidenceColor(c) {
      if (c == null) return "bg-gray-600";
      if (c >= 70) return "bg-green-600";
      if (c >= 40) return "bg-blue-600";
      return "bg-yellow-600";
    }

    function renderMatchCard(m) {
      const div = document.createElement("div");
      div.className = "bg-gray-800 rounded-lg p-5 shadow hover:shadow-lg transition";
      const fanBadge = m.isFanTeam
        ? `<span class="text-xs px-2 py-1 rounded bg-red-600 text-white ml-2">🔴 팬팀</span>`
        : "";
      const reasoningList = (m.reasoning || [])
        .map((r) => `<li class="text-xs text-gray-300 leading-relaxed">• ${r}</li>`)
        .join("");

      div.innerHTML = `
        <div class="flex justify-between items-start mb-3">
          <div>
            <p class="text-xs text-gray-400">${m.league || "EPL"} · ${formatKickoff(m.kickoff)}</p>
            <h3 class="text-lg font-bold text-white mt-1">${m.home} vs ${m.away}${fanBadge}</h3>
          </div>
          <span class="text-xs px-2 py-1 rounded ${confidenceColor(m.confidence)} text-white whitespace-nowrap">
            Confidence ${m.confidence ?? "-"}
          </span>
        </div>
        <div class="grid grid-cols-3 gap-2 text-center text-sm my-3">
          <div class="bg-gray-900 rounded py-2">
            <p class="text-gray-400 text-xs">홈 승</p>
            <p class="text-white font-semibold">${m.probs?.home ?? "-"}%</p>
          </div>
          <div class="bg-gray-900 rounded py-2">
            <p class="text-gray-400 text-xs">무</p>
            <p class="text-white font-semibold">${m.probs?.draw ?? "-"}%</p>
          </div>
          <div class="bg-gray-900 rounded py-2">
            <p class="text-gray-400 text-xs">원정 승</p>
            <p class="text-white font-semibold">${m.probs?.away ?? "-"}%</p>
          </div>
        </div>
        ${
          m.overUnder25
            ? `<div class="grid grid-cols-2 gap-2 text-center text-sm mb-3">
                <div class="bg-gray-900 rounded py-2">
                  <p class="text-gray-400 text-xs">오버 2.5</p>
                  <p class="text-white font-semibold">${m.overUnder25.over}%</p>
                </div>
                <div class="bg-gray-900 rounded py-2">
                  <p class="text-gray-400 text-xs">언더 2.5</p>
                  <p class="text-white font-semibold">${m.overUnder25.under}%</p>
                </div>
              </div>`
            : ""
        }
        ${
          m.pick
            ? `<div class="mt-3 p-2 bg-green-900/40 border border-green-600 rounded text-sm text-green-300">
                ✓ 추천: <strong>${PICK_LABEL[m.pick] || m.pick}</strong> (Edge +${m.edge}%)
              </div>`
            : m.analyzed
            ? `<div class="mt-3 text-sm text-gray-500">추천 없음 (Edge &lt; 5%)</div>`
            : `<div class="mt-3 text-sm text-gray-500">분석 대기 중 (경기 1시간 전)</div>`
        }
        ${reasoningList ? `<ul class="mt-3 space-y-1">${reasoningList}</ul>` : ""}
      `;
      return div;
    }

    window.addEventListener("DOMContentLoaded", () => {
      loadRecommendations();
      loadMatches();
      loadStats();
    });
  </script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">
  <header class="border-b border-gray-800 py-6 px-4">
    <div class="max-w-4xl mx-auto">
      <h1 class="text-2xl font-bold">⚽ TotoLab</h1>
      <p class="text-sm text-gray-400">EPL 경기 데이터 기반 베팅 분석</p>
    </div>
  </header>
  <main class="max-w-4xl mx-auto px-4 py-8">
    <section id="recommendations" class="mb-8"></section>
    <h2 class="text-xl font-semibold mb-4">전체 분석 경기</h2>
    <div id="matches" class="grid gap-4"></div>
    <section id="stats" class="mt-10"></section>
  </main>
</body>
</html>
