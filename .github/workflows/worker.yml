name: Daily analysis worker

on:
  schedule:
    # 03:00 UTC = 12:00 KST. GitHub cron can drift by up to ~15-30 min
    # under load — fine for a daily job; kickoffs are evening KST.
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      horizon:
        description: "Analysis window in hours"
        required: false
        default: "24"

permissions:
  contents: read

concurrency:
  group: worker
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: worker/package-lock.json

      - name: Install worker dependencies
        working-directory: worker
        run: npm ci

      - name: Run engine math tests
        working-directory: worker
        run: node --test v2math.test.mjs

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Write Firebase service account
        env:
          SA_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: printf '%s' "$SA_JSON" > "$RUNNER_TEMP/firebase-sa.json"

      - name: Run analysis
        working-directory: worker
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-sa.json
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: node runOnce.js "${{ github.event.inputs.horizon || '24' }}"

      - name: Telegram alert on failure
        if: failure()
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT}" \
            --data-urlencode text="❌ TotoLab worker 실패: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
