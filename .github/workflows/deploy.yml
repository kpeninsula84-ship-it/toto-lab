name: Deploy to Firebase

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: functions/package-lock.json

      - name: Install functions dependencies
        run: npm install
        working-directory: functions

      - name: Create functions .env from secrets
        run: |
          cat > functions/.env <<EOF
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          FOOTBALL_DATA_TOKEN=${{ secrets.FOOTBALL_DATA_TOKEN }}
          ODDS_API_KEY=${{ secrets.ODDS_API_KEY }}
          ADMIN_TOKEN=${{ secrets.ADMIN_TOKEN }}
          EOF

      - name: Deploy to Firebase
        uses: w9jds/firebase-action@master
        with:
          args: deploy --only functions,hosting,firestore --project toto-lab --force
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Upload injuries to Firestore (if changed)
        run: |
          if [ -f "injuries-payload.json" ]; then
            CHANGED=$(git diff --name-only HEAD~1 HEAD -- injuries-payload.json 2>/dev/null || true)
            if [ -n "$CHANGED" ]; then
              echo "injuries-payload.json changed — uploading to Firestore..."
              curl -f -X POST \
                -H "Content-Type: application/json" \
                -H "x-admin-token: ${{ secrets.ADMIN_TOKEN }}" \
                --data "@injuries-payload.json" \
                https://asia-northeast3-toto-lab.cloudfunctions.net/updateInjuriesBulk
            else
              echo "injuries-payload.json not changed — skipping upload."
            fi
          else
            echo "injuries-payload.json not found — skipping upload."
          fi
