name: Closing odds snapshot

on:
  schedule:
    # Every 30 min during EPL kickoff hours (10:00-21:30 UTC covers
    # lunchtime through late evening kickoffs incl. midweek and
    # rescheduled slots). Each firing makes at most ONE Odds API call,
    # and zero when no match kicks off within the next 75 minutes.
    - cron: "*/30 10-21 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: closing-snapshot
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: worker/package-lock.json

      - name: Install worker dependencies
        working-directory: worker
        run: npm ci

      - name: Write Firebase service account
        env:
          SA_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: printf '%s' "$SA_JSON" > "$RUNNER_TEMP/firebase-sa.json"

      - name: Snapshot closing odds
        working-directory: worker
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-sa.json
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: node closingOnce.js

      - name: Telegram alert on failure
        if: failure()
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT}" \
            --data-urlencode text="❌ TotoLab closing snapshot 실패: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
