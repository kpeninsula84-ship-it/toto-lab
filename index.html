<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="AI-powered EPL betting analysis. Claude analyses every Premier League fixture and flags value bets based on form, injuries, odds and expected value." />
  <title>TotoLab — AI EPL Betting Analysis</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>" />
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-WXQ296JZY3"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-WXQ296JZY3');
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, getDoc, getDocs, doc, query, where, orderBy, limit, Timestamp, setDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyASY-tE9WfcUzFoZ3vCy5lQOX0m5g61A5A",
      authDomain: "toto-lab.firebaseapp.com",
      projectId: "toto-lab",
      storageBucket: "toto-lab.firebasestorage.app",
      messagingSenderId: "66411451289",
      appId: "1:66411451289:web:85fd3c02a5c7f942caf908",
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const PICK_LABEL = {
      home: "Home Win",
      draw: "Draw",
      away: "Away Win",
      over: "Over",
      under: "Under",
      over25: "Over 2.5",
      under25: "Under 2.5",
    };

    async function loadStats() {
      const container = document.getElementById("stats");
      try {
        const snap = await getDoc(doc(db, "stats", "summary"));
        if (!snap.exists()) {
          container.innerHTML = "";
          return;
        }
        const s = snap.data();
        if (s.totalPicks === 0) {
          container.innerHTML = `
            <p class="text-gray-500 text-sm text-center py-4">No recorded picks yet.</p>`;
          return;
        }
        const byType = Object.entries(s.byPickType || {})
          .map(
            ([type, v]) =>
              `<span class="px-2 py-1 bg-gray-800 rounded text-xs">${PICK_LABEL[type] || type}: ${v.wins}/${v.count}</span>`
          )
          .join(" ");
        const roiColor = s.roi > 0 ? "text-green-400" : s.roi < 0 ? "text-red-400" : "text-gray-400";
        container.innerHTML = `
          <h3 class="text-lg font-bold text-white mb-3">Track Record</h3>
          <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
            <div class="bg-gray-800 rounded p-3">
              <p class="text-xs text-gray-400">Total Picks</p>
              <p class="text-xl font-bold text-white">${s.totalPicks}</p>
            </div>
            <div class="bg-gray-800 rounded p-3">
              <p class="text-xs text-gray-400">Hit Rate</p>
              <p class="text-xl font-bold text-white">${s.winRate}% <span class="text-xs text-gray-400">(${s.wins}W ${s.losses}L)</span></p>
            </div>
            <div class="bg-gray-800 rounded p-3">
              <p class="text-xs text-gray-400">P&L (£10 flat stake)</p>
              <p class="text-xl font-bold ${roiColor}">${s.totalProfit >= 0 ? "+" : ""}£${(s.totalProfit / 100).toFixed(2)}</p>
            </div>
            <div class="bg-gray-800 rounded p-3">
              <p class="text-xs text-gray-400">ROI</p>
              <p class="text-xl font-bold ${roiColor}">${s.roi >= 0 ? "+" : ""}${s.roi}%</p>
            </div>
          </div>
          ${byType ? `<div class="mt-3 flex flex-wrap gap-2">${byType}</div>` : ""}
        `;
      } catch (err) {
        container.innerHTML = `<p class="text-red-400 text-sm text-center py-4">Failed to load stats: ${err.message}</p>`;
      }
    }

    async function loadRecommendations() {
      const container = document.getElementById("recommendations");
      try {
        const snap = await getDoc(doc(db, "recommendations", "current"));
        if (!snap.exists()) {
          container.innerHTML = `<p class="text-gray-500 text-sm text-center py-4">No recommendations yet. Waiting for next analysis run.</p>`;
          return;
        }
        const rec = snap.data();

        if (rec.pickCount === 0) {
          const secondary = rec.secondaryPicks || [];
          const secHtml = secondary.map((p) => {
            const kickoff = p.kickoff.toDate ? p.kickoff.toDate() : new Date(p.kickoff);
            return `
              <div class="bg-gray-800 border border-yellow-600/40 rounded-lg p-4 flex items-start gap-3">
                <div class="text-lg font-bold text-yellow-400 w-8">△</div>
                <div class="flex-1">
                  <p class="text-xs text-gray-400">${kickoff.toLocaleString("en-GB", { month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" })}</p>
                  <h4 class="text-white font-semibold">${p.home} vs ${p.away}</h4>
                  <p class="text-yellow-400 text-sm mt-1">
                    <strong>${p.pickLabel || PICK_LABEL[p.pick] || p.pick}</strong> @${p.odds}
                    <span class="text-gray-400 ml-2">· EV ${p.ev >= 0 ? "+" : ""}${p.ev}% · Edge +${p.edge}% · Conf ${p.confidence}</span>
                  </p>
                </div>
              </div>`;
          }).join("");
          container.innerHTML = `
            <div class="bg-yellow-900/30 border border-yellow-700 rounded-lg p-5 mb-4">
              <h3 class="text-lg font-bold text-yellow-300 mb-2">No Value Bets This Round</h3>
              <p class="text-sm text-gray-300">
                Analysed ${rec.totalAnalyzed} fixtures — none cleared the threshold (Edge ≥ ${rec.threshold.edge}%, Confidence ≥ ${rec.threshold.confidence}).
                The market looks efficiently priced or data uncertainty is high.
              </p>
            </div>
            ${secondary.length > 0 ? `
              <div class="mb-2 flex justify-between items-baseline">
                <h3 class="text-base font-bold text-yellow-400">참고 픽 (Conf 40~49)</h3>
                <p class="text-xs text-gray-500">Edge 충족, 신뢰도 낮음 — 참고용</p>
              </div>
              <div class="space-y-2">${secHtml}</div>` : ""}
          `;
          return;
        }

        const picksHtml = rec.picks
          .map((p, i) => {
            const kickoff = p.kickoff.toDate
              ? p.kickoff.toDate()
              : new Date(p.kickoff);
            return `
              <div class="bg-gray-800 border border-green-600/50 rounded-lg p-4 flex items-start gap-3">
                <div class="text-2xl font-bold text-green-400 w-8">${i + 1}</div>
                <div class="flex-1">
                  <p class="text-xs text-gray-400">${kickoff.toLocaleString("en-GB", { month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" })}</p>
                  <h4 class="text-white font-semibold">${p.home} vs ${p.away}</h4>
                  <p class="text-green-400 text-sm mt-1">
                    <strong>${p.pickLabel || PICK_LABEL[p.pick] || p.pick}</strong> @${p.odds}
                    <span class="text-gray-400 ml-2">· EV ${p.ev >= 0 ? "+" : ""}${p.ev}% · Edge +${p.edge}% · Conf ${p.confidence}</span>
                  </p>
                </div>
              </div>`;
          })
          .join("");

        const comboInfo = rec.comboOdds
          ? `<p class="text-sm text-gray-400 mt-3">Acca odds: <strong class="text-green-400">${rec.comboOdds}x</strong> (£10 returns £${(10 * rec.comboOdds).toFixed(2)})</p>`
          : `<p class="text-sm text-gray-400 mt-3">Singles recommended.</p>`;

        const secondaryPicks = rec.secondaryPicks || [];
        const secondaryHtml = secondaryPicks.map((p) => {
          const kickoff = p.kickoff.toDate ? p.kickoff.toDate() : new Date(p.kickoff);
          return `
            <div class="bg-gray-800 border border-yellow-600/40 rounded-lg p-4 flex items-start gap-3">
              <div class="text-lg font-bold text-yellow-400 w-8">△</div>
              <div class="flex-1">
                <p class="text-xs text-gray-400">${kickoff.toLocaleString("en-GB", { month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" })}</p>
                <h4 class="text-white font-semibold">${p.home} vs ${p.away}</h4>
                <p class="text-yellow-400 text-sm mt-1">
                  <strong>${p.pickLabel || PICK_LABEL[p.pick] || p.pick}</strong> @${p.odds}
                  <span class="text-gray-400 ml-2">· EV ${p.ev >= 0 ? "+" : ""}${p.ev}% · Edge +${p.edge}% · Conf ${p.confidence}</span>
                </p>
              </div>
            </div>`;
        }).join("");

        const secondarySection = secondaryPicks.length > 0 ? `
          <div class="mt-5">
            <div class="mb-2 flex justify-between items-baseline">
              <h3 class="text-base font-bold text-yellow-400">참고 픽 (Conf 40~49)</h3>
              <p class="text-xs text-gray-500">Edge 충족, 신뢰도 낮음 — 참고용</p>
            </div>
            <div class="space-y-2">${secondaryHtml}</div>
          </div>` : "";

        container.innerHTML = `
          <div class="mb-3 flex justify-between items-baseline">
            <h3 class="text-lg font-bold text-white">Value Picks (${rec.pickCount})</h3>
            <p class="text-xs text-gray-500">Analysed ${rec.totalAnalyzed} · Passed ${rec.totalPassed}</p>
          </div>
          <div class="space-y-2">${picksHtml}</div>
          ${comboInfo}
          ${secondarySection}
        `;
      } catch (err) {
        container.innerHTML = `<p class="text-red-400 text-sm text-center py-4">Failed to load picks: ${err.message}</p>`;
      }
    }

    async function loadMatches() {
      const container = document.getElementById("matches");
      container.innerHTML = `<p class="text-gray-400 text-center py-12">Loading fixtures...</p>`;

      try {
        const now = Date.now();
        const from = Timestamp.fromMillis(now - 24 * 60 * 60 * 1000);
        const to = Timestamp.fromMillis(now + 4 * 24 * 60 * 60 * 1000);

        const q = query(
          collection(db, "matches"),
          where("kickoff", ">=", from),
          where("kickoff", "<=", to),
          orderBy("kickoff", "asc")
        );
        const snap = await getDocs(q);

        if (snap.empty) {
          container.innerHTML = `<p class="text-gray-400 text-center py-12">No fixtures analysed yet. Check back soon.</p>`;
          return;
        }

        const nowTs = Timestamp.fromMillis(now);
        const upcoming = [];
        const finished = [];
        snap.forEach((doc) => {
          const m = doc.data();
          if (m.kickoff.toMillis() >= now) {
            upcoming.push(m);
          } else {
            finished.push(m);
          }
        });

        // upcoming: soonest first, finished: most recently kicked off first
        upcoming.sort((a, b) => a.kickoff.toMillis() - b.kickoff.toMillis());
        finished.sort((a, b) => b.kickoff.toMillis() - a.kickoff.toMillis());

        container.innerHTML = "";
        for (const m of [...upcoming, ...finished]) {
          container.appendChild(renderMatchCard(m));
        }

        if (upcoming.length === 0 && finished.length === 0) {
          container.innerHTML = `<p class="text-gray-400 text-center py-12">No fixtures analysed yet. Check back soon.</p>`;
        }
      } catch (err) {
        container.innerHTML = `<p class="text-red-400 text-center py-12">Failed to load: ${err.message}</p>`;
      }
    }

    function formatKickoff(ts) {
      if (!ts) return "-";
      const date = ts.toDate ? ts.toDate() : new Date(ts);
      return date.toLocaleString("en-GB", {
        weekday: "short",
        month: "short",
        day: "numeric",
        hour: "2-digit",
        minute: "2-digit",
      });
    }

    function confidenceColor(c) {
      if (c == null) return "bg-gray-600";
      if (c >= 70) return "bg-green-600";
      if (c >= 40) return "bg-blue-600";
      return "bg-yellow-600";
    }

    function renderMatchCard(m) {
      const div = document.createElement("div");
      div.className = "bg-gray-800 rounded-lg p-5 shadow hover:shadow-lg transition";
      const fanBadge = m.isFanTeam
        ? `<span class="text-xs px-2 py-1 rounded bg-red-600 text-white ml-2">Fan Team</span>`
        : "";
      const reasoningList = (m.reasoning || [])
        .map((r) => `<li class="text-xs text-gray-300 leading-relaxed">• ${r}</li>`)
        .join("");

      div.innerHTML = `
        <div class="flex justify-between items-start mb-3">
          <div>
            <p class="text-xs text-gray-400">${m.league || "EPL"} · ${formatKickoff(m.kickoff)}</p>
            <h3 class="text-lg font-bold text-white mt-1">${m.home} vs ${m.away}${fanBadge}</h3>
          </div>
          <span class="text-xs px-2 py-1 rounded ${confidenceColor(m.confidence)} text-white whitespace-nowrap">
            Conf ${m.confidence ?? "-"}
          </span>
        </div>
        <div class="grid grid-cols-3 gap-2 text-center text-sm my-3">
          <div class="bg-gray-900 rounded py-2">
            <p class="text-gray-400 text-xs">Home</p>
            <p class="text-white font-semibold">${m.probs?.home ?? "-"}%</p>
          </div>
          <div class="bg-gray-900 rounded py-2">
            <p class="text-gray-400 text-xs">Draw</p>
            <p class="text-white font-semibold">${m.probs?.draw ?? "-"}%</p>
          </div>
          <div class="bg-gray-900 rounded py-2">
            <p class="text-gray-400 text-xs">Away</p>
            <p class="text-white font-semibold">${m.probs?.away ?? "-"}%</p>
          </div>
        </div>
        ${
          (m.overUnder || m.overUnder25)
            ? (() => {
                const ou = m.overUnder || m.overUnder25;
                const line = m.ouLine ?? 2.5;
                return `<div class="grid grid-cols-2 gap-2 text-center text-sm mb-3">
                <div class="bg-gray-900 rounded py-2">
                  <p class="text-gray-400 text-xs">Over ${line}</p>
                  <p class="text-white font-semibold">${ou.over}%</p>
                </div>
                <div class="bg-gray-900 rounded py-2">
                  <p class="text-gray-400 text-xs">Under ${line}</p>
                  <p class="text-white font-semibold">${ou.under}%</p>
                </div>
              </div>`;
              })()
            : ""
        }
        ${
          m.pick
            ? (() => {
                const line = m.ouLine ?? 2.5;
                const label =
                  m.pick === "over" ? `Over ${line}`
                  : m.pick === "under" ? `Under ${line}`
                  : (PICK_LABEL[m.pick] || m.pick);
                return `<div class="mt-3 p-2 bg-green-900/40 border border-green-600 rounded text-sm text-green-300">
                ✓ Pick: <strong>${label}</strong> · Edge +${m.edge}% · EV +${m.ev ?? "-"}%
              </div>`;
              })()
            : m.analyzed
            ? `<div class="mt-3 text-sm text-gray-500">No value bet (Edge &lt; 5%)</div>`
            : `<div class="mt-3 text-sm text-gray-500">Analysis pending</div>`
        }
        ${reasoningList ? `<ul class="mt-3 space-y-1">${reasoningList}</ul>` : ""}
      `;
      return div;
    }

    async function trackAndDisplayVisits() {
      const today = new Date().toISOString().split("T")[0];
      const storageKey = `totolab_v2_visited_${today}`;
      const ref = doc(db, "stats", "visits");

      if (!localStorage.getItem(storageKey)) {
        try {
          await updateDoc(ref, {
            total: increment(1),
            [`daily.${today}`]: increment(1),
          });
          localStorage.setItem(storageKey, "1");
        } catch {
          try {
            await setDoc(ref, { total: 1, daily: { [today]: 1 } });
            localStorage.setItem(storageKey, "1");
          } catch {}
        }
      }

      try {
        const snap = await getDoc(ref);
        if (snap.exists()) {
          const d = snap.data();
          const todayCount = d.daily?.[today] ?? 0;
          document.getElementById("visit-counter").textContent =
            `👁 Today: ${todayCount} · Total: ${d.total ?? 0}`;
        }
      } catch {}
    }

    async function loadArchive() {
      const container = document.getElementById("archive");
      try {
        const q = query(
          collection(db, "matches"),
          where("result", "in", ["won", "lost"]),
          orderBy("kickoff", "desc"),
          limit(50)
        );
        const snap = await getDocs(q);

        if (snap.empty) {
          container.innerHTML = `<p class="text-gray-500 text-sm text-center py-4">No recorded results yet.</p>`;
          return;
        }

        const rows = [];
        snap.forEach((d) => {
          const m = d.data();
          if (!m.pick) return;
          const kickoff = m.kickoff.toDate ? m.kickoff.toDate() : new Date(m.kickoff);
          const dateStr = kickoff.toLocaleString("en-GB", { month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" });
          const won = m.result === "won";

          const pickOdds =
            m.pick === "home" ? m.odds?.matchWinner?.home ?? m.odds?.home
            : m.pick === "draw" ? m.odds?.matchWinner?.draw ?? m.odds?.draw
            : m.pick === "away" ? m.odds?.matchWinner?.away ?? m.odds?.away
            : m.pick === "over" || m.pick === "over25" ? m.odds?.overUnder?.over ?? m.odds?.over
            : m.pick === "under" || m.pick === "under25" ? m.odds?.overUnder?.under ?? m.odds?.under
            : null;

          const pl = pickOdds
            ? won ? `+£${((pickOdds - 1) * 10).toFixed(2)}` : `-£10.00`
            : "-";
          const plColor = won ? "text-green-400" : "text-red-400";

          const ouLine = m.ouLine ?? 2.5;
          const pickLabel =
            m.pick === "over" ? `Over ${ouLine}`
            : m.pick === "under" ? `Under ${ouLine}`
            : m.pick === "over25" ? "Over 2.5"
            : m.pick === "under25" ? "Under 2.5"
            : PICK_LABEL[m.pick] || m.pick;

          const score = m.finalScore
            ? `<span class="text-gray-400">${m.finalScore.home}–${m.finalScore.away}</span>`
            : "";

          rows.push(`
            <tr class="border-t border-gray-700 hover:bg-gray-800/50 transition">
              <td class="py-2 pr-3 text-xs text-gray-400 whitespace-nowrap">${dateStr}</td>
              <td class="py-2 pr-3 text-sm text-white">${m.home} vs ${m.away} ${score}</td>
              <td class="py-2 pr-3 text-sm text-gray-300">${pickLabel}</td>
              <td class="py-2 pr-3 text-sm text-gray-300">${pickOdds ?? "-"}</td>
              <td class="py-2 pr-3 text-xs text-gray-400">+${m.edge ?? "-"}%</td>
              <td class="py-2 pr-3">
                <span class="text-xs px-2 py-0.5 rounded ${won ? "bg-green-700 text-green-100" : "bg-red-800 text-red-200"}">
                  ${won ? "✓ Won" : "✗ Lost"}
                </span>
              </td>
              <td class="py-2 text-sm font-mono ${plColor}">${pl}</td>
            </tr>`);
        });

        if (rows.length === 0) {
          container.innerHTML = `<p class="text-gray-500 text-sm text-center py-4">No recorded results yet.</p>`;
          return;
        }

        container.innerHTML = `
          <h3 class="text-lg font-bold text-white mb-3">Past Picks</h3>
          <div class="overflow-x-auto">
            <table class="w-full text-left">
              <thead>
                <tr class="text-xs text-gray-500">
                  <th class="pb-2 pr-3 font-normal">Date</th>
                  <th class="pb-2 pr-3 font-normal">Match</th>
                  <th class="pb-2 pr-3 font-normal">Pick</th>
                  <th class="pb-2 pr-3 font-normal">Odds</th>
                  <th class="pb-2 pr-3 font-normal">Edge</th>
                  <th class="pb-2 pr-3 font-normal">Result</th>
                  <th class="pb-2 font-normal">P&L</th>
                </tr>
              </thead>
              <tbody>${rows.join("")}</tbody>
            </table>
          </div>
        `;
      } catch (err) {
        container.innerHTML = `<p class="text-red-400 text-sm text-center py-4">Failed to load archive: ${err.message}</p>`;
      }
    }

    window.addEventListener("DOMContentLoaded", () => {
      loadRecommendations();
      loadMatches();
      loadStats();
      loadArchive();
      trackAndDisplayVisits();
    });
  </script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">
  <header class="border-b border-gray-800 py-6 px-4">
    <div class="max-w-4xl mx-auto">
      <h1 class="text-2xl font-bold">⚽ TotoLab</h1>
      <p class="text-sm text-gray-400">AI-powered EPL betting analysis · Updated daily</p>
    </div>
  </header>
  <main class="max-w-4xl mx-auto px-4 py-8">
    <section id="recommendations" class="mb-8"></section>
    <h2 class="text-xl font-semibold mb-4">All Analysed Fixtures</h2>
    <div id="matches" class="grid gap-4"></div>
    <section id="stats" class="mt-10"></section>
    <section id="archive" class="mt-10"></section>
  </main>
  <footer class="border-t border-gray-800 py-6 px-4 mt-12">
    <div class="max-w-4xl mx-auto text-center text-xs text-gray-600 space-y-1">
      <p id="visit-counter" class="text-gray-500"></p>
      <p>For informational purposes only. Not financial advice. Please gamble responsibly.</p>
    </div>
  </footer>
</body>
</html>
