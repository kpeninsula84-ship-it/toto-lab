  <script type="module">

    import { getFirestore, collection, getDoc, getDocs, doc, query, where, orderBy, limit, Timestamp, setDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyASY-tE9WfcUzFoZ3vCy5lQOX0m5g61A5A",
      authDomain: "toto-lab.firebaseapp.com",
      projectId: "toto-lab",
      storageBucket: "toto-lab.firebasestorage.app",
      messagingSenderId: "66411451289",
      appId: "1:66411451289:web:85fd3c02a5c7f942caf908",
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // ── i18n ──────────────────────────────────────────────────────────────────

    const STRINGS = {
      en: {
        tagline: "AI-powered EPL betting analysis · Updated daily",
        allFixtures: "All Analysed Fixtures",
        loading: "Loading fixtures...",
        noFixtures: "No fixtures analysed yet. Check back soon.",
        failedLoad: (msg) => `Failed to load: ${msg}`,
        // stats
        trackRecord: "Track Record",
        totalPicks: "Total Picks",
        hitRate: "Hit Rate",
        pnl: "P&L (£10 flat stake)",
        roi: "ROI",
        avgClv: "Avg CLV",
        allTime: "all-time",
        allTimeLine: (n, wr, roi) => `All-time: ${n} picks · ${wr}% hit · ROI ${roi}%`,
        noPicksYet: "No recorded picks yet.",
        failedStats: (msg) => `Failed to load stats: ${msg}`,
        lastAnalysis: (when, n) => `Last analysis: ${when} · ${n} matches`,
        // recommendations
        valuePicks: (n) => `Value Picks (${n})`,
        analysedPassed: (a, p) => `Analysed ${a} · Passed ${p}`,
        noValueBetsTitle: "No Value Bets This Round",
        noValueBetsDesc: (n, edge, conf) =>

        accaOdds: (odds, ret) =>
          `Acca odds: <strong class="text-green-400">${odds}x</strong> (£10 returns £${ret})`,
        betmanLine: (odds, ev) => `Betman @${odds} · EV ${ev >= 0 ? "+" : ""}${ev}%`,
        betmanSkip: "low odds — skip",
        betmanDeadline: (t) => `closes ${t}`,
        minOddsLine: (odds) => `Min. odds to bet: ${odds}`,
        noRecs: "No recommendations yet. Waiting for next analysis run.",
        failedPicks: (msg) => `Failed to load picks: ${msg}`,
        // match card
        fanTeam: "Fan Team",
        home: "Home",
        draw: "Draw",
        away: "Away",
        pickLabel: "Pick",
        noValueBet: "No value bet (fair edge < 5%)",
        analysisPending: "Analysis pending",
        // archive
        pastPicks: "Past Picks",
        colDate: "Date",
        colMatch: "Match",
        colPick: "Pick",
        colOdds: "Odds",

        failedArchive: (msg) => `Failed to load archive: ${msg}`,
        // footer
        disclaimer: "For informational purposes only. Not financial advice. Please gamble responsibly.",
        toggleBtn: "한국어",
      },
      kr: {
        tagline: "AI 기반 EPL 베팅 분석 · 매일 업데이트",
        allFixtures: "전체 분석 경기",
        loading: "경기 불러오는 중...",
        noFixtures: "아직 분석된 경기가 없습니다. 나중에 다시 확인하세요.",
        failedLoad: (msg) => `불러오기 실패: ${msg}`,
        // stats
        trackRecord: "Track Record",
        totalPicks: "총 픽 수",
        hitRate: "적중률",
        pnl: "P&L (£10 단위)",
        roi: "ROI",
        avgClv: "평균 CLV",
        allTime: "전체 누적",
        allTimeLine: (n, wr, roi) => `전체 누적: ${n}픽 · 적중률 ${wr}% · ROI ${roi}%`,
        noPicksYet: "기록된 픽이 없습니다.",
        failedStats: (msg) => `통계 불러오기 실패: ${msg}`,
        lastAnalysis: (when, n) => `마지막 분석: ${when} · ${n}경기`,
        // recommendations
        valuePicks: (n) => `Value Picks (${n})`,
        analysedPassed: (a, p) => `분석 ${a} · 통과 ${p}`,
        noValueBetsTitle: "이번 라운드 Value Bet 없음",
        noValueBetsDesc: (n, edge, conf) =>
          `${n}경기 분석 완료 — 기준치(Edge ≥ ${edge}%, Confidence ≥ ${conf})를 넘긴 경기 없음. 시장이 효율적으로 가격이 형성됐거나 데이터 불확실성이 높습니다.`,
        singles: "단식 베팅 권장.",
        accaOdds: (odds, ret) =>
          `Acca 배당: <strong class="text-green-400">${odds}x</strong> (£10 → £${ret})`,
        betmanLine: (odds, ev) => `Betman @${odds} · EV ${ev >= 0 ? "+" : ""}${ev}%`,
        betmanSkip: "배당 부족 — 스킵 권장",
        betmanDeadline: (t) => `마감 ${t}`,
        minOddsLine: (odds) => `최소 베팅 배당: ${odds}`,
        noRecs: "아직 추천 픽이 없습니다. 다음 분석 실행을 기다려주세요.",
        failedPicks: (msg) => `픽 불러오기 실패: ${msg}`,
        // match card
        fanTeam: "응원팀",
        home: "홈",
        draw: "무승부",
        away: "원정",
        pickLabel: "픽",
        noValueBet: "Value Bet 없음 (fair edge < 5%)",
        analysisPending: "분석 대기 중",
        // archive
        pastPicks: "지난 픽 기록",
        colDate: "날짜",
        colMatch: "경기",
        colPick: "픽",
        colOdds: "배당",
        colEdge: "Edge",
        colResult: "결과",
        colPnl: "P&L",
        won: "✓ 적중",
        lost: "✗ 실패",
        push: "– 적특",
        noResults: "기록된 결과가 없습니다.",
        failedArchive: (msg) => `기록 불러오기 실패: ${msg}`,
        // footer
        disclaimer: "참고 목적으로만 제공됩니다. 투자 조언이 아닙니다. 책임감 있는 베팅을 하세요.",
        toggleBtn: "English",
      },
    };

    let currentLang = localStorage.getItem("totolab_lang") || "en";

    function t(key, ...args) {
      const val = STRINGS[currentLang][key];
      return typeof val === "function" ? val(...args) : val;
    }

    // Always derive pick label from pick type + line, ignoring stored pickLabel (which may be in a different language)
    function getPickLabel(pick, ouLine) {
      const line = ouLine ?? 2.5;
      if (pick === "over" || pick === "over25") return `Over ${line}`;
      if (pick === "under" || pick === "under25") return `Under ${line}`;
      const labels = {
        en: { home: "Home Win", draw: "Draw", away: "Away Win" },
        kr: { home: "홈 승", draw: "무승부", away: "원정 승" },
      };
      return (labels[currentLang] ?? labels.en)[pick] ?? pick;
    }

    function applyStaticTranslations() {
      document.querySelectorAll("[data-i18n]").forEach((el) => {
        const key = el.dataset.i18n;
        const val = STRINGS[currentLang][key];
        if (val !== undefined && typeof val === "string") el.textContent = val;
      });
      const btn = document.getElementById("lang-toggle");
      if (btn) btn.textContent = t("toggleBtn");
      document.documentElement.lang = currentLang === "kr" ? "ko" : "en";
    }

    window.toggleLang = function () {
      currentLang = currentLang === "en" ? "kr" : "en";
      localStorage.setItem("totolab_lang", currentLang);
      applyStaticTranslations();
      // Re-render all dynamic sections
      loadRecommendations();
      loadMatches();
      loadStats();
      loadArchive();
      loadLastRun();
    };

    // ── Data helpers ──────────────────────────────────────────────────────────

    const PICK_LABEL = {
      home: "Home Win",
      draw: "Draw",
      away: "Away Win",
      over: "Over",
      under: "Under",
      over25: "Over 2.5",
      under25: "Under 2.5",
    };

    // ── loadStats ─────────────────────────────────────────────────────────────

    // EPL seasons run Aug–May: July+ belongs to the season starting this year.
    function currentSeason() {
      const d = new Date();
      const y = d.getFullYear();
      const startYear = d.getMonth() >= 6 ? y : y - 1;
      return `${startYear}-${String((startYear + 1) % 100).padStart(2, "0")}`;
    }

    async function loadStats() {
      const container = document.getElementById("stats");
      try {
        const snap = await getDoc(doc(db, "stats", "summary"));
        if (!snap.exists()) {
          container.innerHTML = "";
          return;
        }
        const all = snap.data();
        const season = currentSeason();
        const cur = all.bySeason?.[season];
        const s = cur ?? all; // headline: current season when it has data
        const isSeason = !!cur;

        if ((s.totalPicks ?? 0) === 0 && (s.pushes ?? 0) === 0) {
          container.innerHTML = `<p class="text-gray-500 text-sm text-center py-4">${t("noPicksYet")}</p>`;
          return;
        }
        const byType = Object.entries(s.byPickType || {})
          .map(
            ([type, v]) =>
              `<span class="px-2 py-1 bg-gray-800 rounded text-xs">${PICK_LABEL[type] || type}: ${v.wins}/${v.count}</span>`
          )
          .join(" ");
        const roiColor = s.roi > 0 ? "text-green-400" : s.roi < 0 ? "text-red-400" : "text-gray-400";
        const clvColor = s.avgClv > 0 ? "text-green-400" : s.avgClv < 0 ? "text-red-400" : "text-gray-400";
        const pushNote = s.pushes > 0 ? ` <span class="text-xs text-gray-400">P${s.pushes}</span>` : "";
        const clvCard = s.avgClv != null ? `
            <div class="bg-gray-800 rounded p-3">
              <p class="text-xs text-gray-400">${t("avgClv")} <span class="text-gray-600">(n=${s.clvCount})</span></p>
              <p class="text-xl font-bold ${clvColor}">${s.avgClv >= 0 ? "+" : ""}${s.avgClv}%</p>
            </div>` : "";
        const allTimeLine = isSeason && all.totalPicks > s.totalPicks
          ? `<p class="mt-2 text-xs text-gray-500">${t("allTimeLine", all.totalPicks, all.winRate, all.roi)}</p>`
          : "";
        container.innerHTML = `
          <h3 class="text-lg font-bold text-white mb-3">${t("trackRecord")} <span class="text-sm font-normal text-gray-400">(${isSeason ? season : t("allTime")})</span></h3>
          <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
            <div class="bg-gray-800 rounded p-3">
              <p class="text-xs text-gray-400">${t("totalPicks")}</p>
              <p class="text-xl font-bold text-white">${s.totalPicks}</p>
            </div>
            <div class="bg-gray-800 rounded p-3">
              <p class="text-xs text-gray-400">${t("hitRate")}</p>
              <p class="text-xl font-bold text-white">${s.winRate}% <span class="text-xs text-gray-400">(${s.wins}W ${s.losses}L)</span>${pushNote}</p>
            </div>
            <div class="bg-gray-800 rounded p-3">
              <p class="text-xs text-gray-400">${t("pnl")}</p>
              <p class="text-xl font-bold ${roiColor}">${s.totalProfit >= 0 ? "+" : ""}£${(s.totalProfit / 100).toFixed(2)}</p>
            </div>
            <div class="bg-gray-800 rounded p-3">
              <p class="text-xs text-gray-400">${t("roi")}</p>
              <p class="text-xl font-bold ${roiColor}">${s.roi >= 0 ? "+" : ""}${s.roi}%</p>
            </div>
            ${clvCard}
          </div>
          ${byType ? `<div class="mt-3 flex flex-wrap gap-2">${byType}</div>` : ""}
          ${allTimeLine}
        `;
      } catch (err) {
        container.innerHTML = `<p class="text-red-400 text-sm text-center py-4">${t("failedStats", err.message)}</p>`;
      }
    }

    // ── loadRecommendations ───────────────────────────────────────────────────

    async function loadRecommendations() {
      const container = document.getElementById("recommendations");
      try {
        const snap = await getDoc(doc(db, "recommendations", "current"));
        if (!snap.exists()) {
          container.innerHTML = `<p class="text-gray-500 text-sm text-center py-4">${t("noRecs")}</p>`;
          return;
        }
        const rec = snap.data();

        if (rec.pickCount === 0) {
          container.innerHTML = `
            <div class="bg-yellow-900/30 border border-yellow-700 rounded-lg p-5 mb-4">
              <h3 class="text-lg font-bold text-yellow-300 mb-2">${t("noValueBetsTitle")}</h3>
              <p class="text-sm text-gray-300">
                ${t("noValueBetsDesc", rec.totalAnalyzed, rec.threshold.edge, rec.threshold.confidence)}
              </p>
            </div>
          `;
          return;
        }

        const picksHtml = rec.picks.map((p, i) => {
          const kickoff = p.kickoff.toDate ? p.kickoff.toDate() : new Date(p.kickoff);
          // Betman is Korea-only — show its price/deadline in Korean mode;
          // English viewers get the bookmaker-agnostic break-even line.
          let betmanInfo = "";
          if (currentLang === "kr" && p.betmanOdds != null) {
            const evBad = p.betmanEv != null && p.betmanEv < 0;
            const deadline = p.betmanDeadline
              ? " · " + t("betmanDeadline", (p.betmanDeadline.toDate ? p.betmanDeadline.toDate() : new Date(p.betmanDeadline)).toLocaleString("ko-KR", { month: "numeric", day: "numeric", hour: "2-digit", minute: "2-digit" }))
              : "";
            betmanInfo = `<p class="text-xs mt-1 ${evBad ? "text-orange-300" : "text-emerald-300"}">${t("betmanLine", p.betmanOdds, p.betmanEv ?? 0)}${evBad ? " ⚠️ " + t("betmanSkip") : ""}${deadline}</p>`;
          } else if (p.minOdds != null) {
            betmanInfo = `<p class="text-xs mt-1 text-gray-400">${t("minOddsLine", p.minOdds)}</p>`;
          }
          return `
            <div class="bg-gray-800 border border-green-600/50 rounded-lg p-4 flex items-start gap-3">
              <div class="text-2xl font-bold text-green-400 w-8">${i + 1}</div>
              <div class="flex-1">
                <p class="text-xs text-gray-400">${kickoff.toLocaleString("en-GB", { month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" })}</p>
                <h4 class="text-white font-semibold">${p.home} vs ${p.away}</h4>
                <p class="text-green-400 text-sm mt-1">
                  <strong>${getPickLabel(p.pick, p.ouLine)}</strong> @${p.odds}
                  <span class="text-gray-400 ml-2">· EV ${p.ev >= 0 ? "+" : ""}${p.ev}% · Edge +${p.edge}% · Conf ${p.confidence}</span>
                </p>
                ${betmanInfo}
              </div>
            </div>`;
        }).join("");

        const comboInfo = rec.comboOdds
          ? `<p class="text-sm text-gray-400 mt-3">${t("accaOdds", rec.comboOdds, (10 * rec.comboOdds).toFixed(2))}</p>`
          : `<p class="text-sm text-gray-400 mt-3">${t("singles")}</p>`;

        container.innerHTML = `
          <div class="mb-3 flex justify-between items-baseline">
            <h3 class="text-lg font-bold text-white">${t("valuePicks", rec.pickCount)}</h3>
            <p class="text-xs text-gray-500">${t("analysedPassed", rec.totalAnalyzed, rec.totalPassed)}</p>
          </div>
          <div class="space-y-2">${picksHtml}</div>
          ${comboInfo}
        `;
      } catch (err) {
        container.innerHTML = `<p class="text-red-400 text-sm text-center py-4">${t("failedPicks", err.message)}</p>`;
      }
    }

    // ── loadMatches ───────────────────────────────────────────────────────────

    async function loadMatches() {
      const container = document.getElementById("matches");
      container.innerHTML = `<p class="text-gray-400 text-center py-12">${t("loading")}</p>`;

      try {
        const now = Date.now();
        const from = Timestamp.fromMillis(now - 24 * 60 * 60 * 1000);
        const to = Timestamp.fromMillis(now + 4 * 24 * 60 * 60 * 1000);

        const q = query(
          collection(db, "matches"),
          where("kickoff", ">=", from),
          where("kickoff", "<=", to),
          orderBy("kickoff", "asc")
        );
        const snap = await getDocs(q);

        if (snap.empty) {
          container.innerHTML = `<p class="text-gray-400 text-center py-12">${t("noFixtures")}</p>`;
          return;
        }

        const nowTs = Timestamp.fromMillis(now);
        const upcoming = [];
        const finished = [];
        snap.forEach((doc) => {
          const m = doc.data();
          if (m.kickoff.toMillis() >= now) {
            upcoming.push(m);
          } else {
            finished.push(m);
          }
        });

        upcoming.sort((a, b) => a.kickoff.toMillis() - b.kickoff.toMillis());
        finished.sort((a, b) => b.kickoff.toMillis() - a.kickoff.toMillis());

        container.innerHTML = "";
        for (const m of [...upcoming, ...finished]) {
          container.appendChild(renderMatchCard(m));
        }

        if (upcoming.length === 0 && finished.length === 0) {
          container.innerHTML = `<p class="text-gray-400 text-center py-12">${t("noFixtures")}</p>`;
        }
      } catch (err) {
        container.innerHTML = `<p class="text-red-400 text-center py-12">${t("failedLoad", err.message)}</p>`;
      }
    }

    function formatKickoff(ts) {
      if (!ts) return "-";
      const date = ts.toDate ? ts.toDate() : new Date(ts);
      return date.toLocaleString("en-GB", {
        weekday: "short",
        month: "short",
        day: "numeric",
        hour: "2-digit",
        minute: "2-digit",
      });
    }

    function confidenceColor(c) {
      if (c == null) return "bg-gray-600";
      if (c >= 70) return "bg-green-600";
      if (c >= 40) return "bg-blue-600";
      return "bg-yellow-600";
    }

    function renderMatchCard(m) {
      const div = document.createElement("div");
      div.className = "bg-gray-800 rounded-lg p-5 shadow hover:shadow-lg transition";
      const fanBadge = m.isFanTeam
        ? `<span class="text-xs px-2 py-1 rounded bg-red-600 text-white ml-2">${t("fanTeam")}</span>`
        : "";
      const reasoningSource = (currentLang === "kr" && m.reasoningKr) ? m.reasoningKr : (m.reasoning || []);
      const reasoningList = reasoningSource
        .map((r) => `<li class="text-xs text-gray-300 leading-relaxed">• ${r}</li>`)
        .join("");

      div.innerHTML = `
        <div class="flex justify-between items-start mb-3">
          <div>
            <p class="text-xs text-gray-400">${m.league || "EPL"} · ${formatKickoff(m.kickoff)}</p>
            <h3 class="text-lg font-bold text-white mt-1">${m.home} vs ${m.away}${fanBadge}</h3>
          </div>
          <span class="text-xs px-2 py-1 rounded ${confidenceColor(m.confidence)} text-white whitespace-nowrap">
            Conf ${m.confidence ?? "-"}
          </span>
        </div>
        <div class="grid grid-cols-3 gap-2 text-center text-sm my-3">
          <div class="bg-gray-900 rounded py-2">
            <p class="text-gray-400 text-xs">${t("home")}</p>
            <p class="text-white font-semibold">${m.probs?.home ?? "-"}%</p>
          </div>
          <div class="bg-gray-900 rounded py-2">
            <p class="text-gray-400 text-xs">${t("draw")}</p>
            <p class="text-white font-semibold">${m.probs?.draw ?? "-"}%</p>
          </div>
          <div class="bg-gray-900 rounded py-2">
            <p class="text-gray-400 text-xs">${t("away")}</p>
            <p class="text-white font-semibold">${m.probs?.away ?? "-"}%</p>
          </div>
        </div>
        ${
          (m.overUnder || m.overUnder25)
            ? (() => {
                const ou = m.overUnder || m.overUnder25;
                const line = m.ouLine ?? 2.5;
                return `<div class="grid grid-cols-2 gap-2 text-center text-sm mb-3">
                <div class="bg-gray-900 rounded py-2">
                  <p class="text-gray-400 text-xs">Over ${line}</p>
                  <p class="text-white font-semibold">${ou.over}%</p>
                </div>
                <div class="bg-gray-900 rounded py-2">
                  <p class="text-gray-400 text-xs">Under ${line}</p>
                  <p class="text-white font-semibold">${ou.under}%</p>
                </div>
              </div>`;
              })()
            : ""
        }
        ${
          m.pick
            ? (() => {
                const label = getPickLabel(m.pick, m.ouLine);
                const edgeShown = m.edgeFair ?? m.edge;
                const edgeSign = edgeShown >= 0 ? "+" : "";
                return `<div class="mt-3 p-2 bg-green-900/40 border border-green-600 rounded text-sm text-green-300">
                ✓ ${t("pickLabel")}: <strong>${label}</strong> · Edge ${edgeSign}${edgeShown}% (fair) · EV +${m.ev ?? "-"}%
              </div>`;
              })()
            : m.analyzed
            ? `<div class="mt-3 text-sm text-gray-500">${t("noValueBet")}</div>`
            : `<div class="mt-3 text-sm text-gray-500">${t("analysisPending")}</div>`
        }
        ${reasoningList ? `<ul class="mt-3 space-y-1">${reasoningList}</ul>` : ""}
      `;
      return div;
    }

    // ── loadLastRun ───────────────────────────────────────────────────────────

    function timeAgo(date) {
      const mins = Math.max(0, Math.round((Date.now() - date.getTime()) / 60000));
      if (currentLang === "kr") {
        if (mins < 60) return `${mins}분 전`;
        if (mins < 48 * 60) return `${Math.round(mins / 60)}시간 전`;
        return `${Math.round(mins / 1440)}일 전`;
      }
      if (mins < 60) return `${mins}m ago`;
      if (mins < 48 * 60) return `${Math.round(mins / 60)}h ago`;
      return `${Math.round(mins / 1440)}d ago`;
    }

    async function loadLastRun() {
      const el = document.getElementById("last-run");
      if (!el) return;
      try {
        const q = query(collection(db, "runs"), orderBy("finishedAt", "desc"), limit(1));
        const snap = await getDocs(q);
        if (snap.empty) { el.textContent = ""; return; }
        const r = snap.docs[0].data();
        const when = r.finishedAt?.toDate ? r.finishedAt.toDate() : null;
        if (!when) { el.textContent = ""; return; }
        el.textContent = t("lastAnalysis", timeAgo(when), r.analyzed ?? 0);
      } catch {
        el.textContent = "";
      }
    }

    // ── trackAndDisplayVisits ─────────────────────────────────────────────────

    async function trackAndDisplayVisits() {
      const today = new Date().toISOString().split("T")[0];
      const storageKey = `totolab_v2_visited_${today}`;
      const ref = doc(db, "stats", "visits");

      if (!localStorage.getItem(storageKey)) {
        try {
          await updateDoc(ref, {
            total: increment(1),
            [`daily.${today}`]: increment(1),
          });
          localStorage.setItem(storageKey, "1");
        } catch {
          try {
            await setDoc(ref, { total: 1, daily: { [today]: 1 } });
            localStorage.setItem(storageKey, "1");
          } catch {}
        }
      }

      try {
        const snap = await getDoc(ref);
        if (snap.exists()) {
          const d = snap.data();
          const todayCount = d.daily?.[today] ?? 0;
          document.getElementById("visit-counter").textContent =
            `👁 Today: ${todayCount} · Total: ${d.total ?? 0}`;
        }
      } catch {}
    }

    // ── loadArchive ───────────────────────────────────────────────────────────

    async function loadArchive() {
      const container = document.getElementById("archive");
      try {
        const q = query(
          collection(db, "matches"),
          where("result", "in", ["won", "lost", "push"]),
          orderBy("kickoff", "desc"),
          limit(50)
        );
        const snap = await getDocs(q);

        if (snap.empty) {
          container.innerHTML = `<p class="text-gray-500 text-sm text-center py-4">${t("noResults")}</p>`;
          return;
        }

        const rows = [];
        snap.forEach((d) => {
          const m = d.data();
          if (!m.pick) return;
          const kickoff = m.kickoff.toDate ? m.kickoff.toDate() : new Date(m.kickoff);
          const dateStr = kickoff.toLocaleString("en-GB", { month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" });
          const won = m.result === "won";
          const isPush = m.result === "push";

          const pickOdds =
            m.pick === "home" ? m.odds?.matchWinner?.home ?? m.odds?.home
            : m.pick === "draw" ? m.odds?.matchWinner?.draw ?? m.odds?.draw
            : m.pick === "away" ? m.odds?.matchWinner?.away ?? m.odds?.away
            : m.pick === "over" || m.pick === "over25" ? m.odds?.overUnder?.over ?? m.odds?.over
            : m.pick === "under" || m.pick === "under25" ? m.odds?.overUnder?.under ?? m.odds?.under
            : null;

          const pl = isPush
            ? "£0.00"
            : pickOdds
            ? won ? `+£${((pickOdds - 1) * 10).toFixed(2)}` : `-£10.00`
            : "-";
          const plColor = isPush ? "text-gray-400" : won ? "text-green-400" : "text-red-400";

          const pickLabel = getPickLabel(m.pick, m.ouLine);

          const score = m.finalScore
            ? `<span class="text-gray-400">${m.finalScore.home}–${m.finalScore.away}</span>`
            : "";

          rows.push(`
            <tr class="border-t border-gray-700 hover:bg-gray-800/50 transition">
              <td class="py-2 pr-3 text-xs text-gray-400 whitespace-nowrap">${dateStr}</td>
              <td class="py-2 pr-3 text-sm text-white">${m.home} vs ${m.away} ${score}</td>
              <td class="py-2 pr-3 text-sm text-gray-300">${pickLabel}</td>
              <td class="py-2 pr-3 text-sm text-gray-300">${pickOdds ?? "-"}</td>
              <td class="py-2 pr-3 text-xs text-gray-400">+${m.edgeFair ?? m.edge ?? "-"}%</td>
              <td class="py-2 pr-3">
                <span class="text-xs px-2 py-0.5 rounded ${isPush ? "bg-gray-700 text-gray-300" : won ? "bg-green-700 text-green-100" : "bg-red-800 text-red-200"}">
                  ${isPush ? t("push") : won ? t("won") : t("lost")}
                </span>
              </td>
              <td class="py-2 text-sm font-mono ${plColor}">${pl}</td>
            </tr>`);
        });

        if (rows.length === 0) {
          container.innerHTML = `<p class="text-gray-500 text-sm text-center py-4">${t("noResults")}</p>`;
          return;
        }

        container.innerHTML = `
          <h3 class="text-lg font-bold text-white mb-3">${t("pastPicks")}</h3>
          <div class="overflow-x-auto">
            <table class="w-full text-left">
              <thead>
                <tr class="text-xs text-gray-500">
                  <th class="pb-2 pr-3 font-normal">${t("colDate")}</th>
                  <th class="pb-2 pr-3 font-normal">${t("colMatch")}</th>
                  <th class="pb-2 pr-3 font-normal">${t("colPick")}</th>
                  <th class="pb-2 pr-3 font-normal">${t("colOdds")}</th>
                  <th class="pb-2 pr-3 font-normal">${t("colEdge")}</th>
                  <th class="pb-2 pr-3 font-normal">${t("colResult")}</th>
                  <th class="pb-2 font-normal">${t("colPnl")}</th>
                </tr>
              </thead>
              <tbody>${rows.join("")}</tbody>
            </table>
          </div>
        `;
      } catch (err) {
        container.innerHTML = `<p class="text-red-400 text-sm text-center py-4">${t("failedArchive", err.message)}</p>`;
      }
    }

    // ── Init ──────────────────────────────────────────────────────────────────

    window.addEventListener("DOMContentLoaded", () => {
      applyStaticTranslations();
      loadRecommendations();
      loadMatches();
      loadStats();
      loadArchive();
      loadLastRun();
      trackAndDisplayVisits();
    });
  </script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">
  <header class="border-b border-gray-800 py-6 px-4">
    <div class="max-w-4xl mx-auto flex items-start justify-between gap-4">
      <div>
        <h1 class="text-2xl font-bold">⚽ TotoLab</h1>
        <p class="text-sm text-gray-400" data-i18n="tagline">AI-powered EPL betting analysis · Updated daily</p>
        <p id="last-run" class="text-xs text-gray-600 mt-0.5"></p>
      </div>
      <button
        id="lang-toggle"
        onclick="toggleLang()"
        class="mt-1 shrink-0 text-xs px-3 py-1.5 border border-gray-600 rounded text-gray-400 hover:text-white hover:border-gray-400 transition"
      >한국어</button>
    </div>
  </header>
  <main class="max-w-4xl mx-auto px-4 py-8">
    <section id="recommendations" class="mb-8"></section>
    <h2 class="text-xl font-semibold mb-4" data-i18n="allFixtures">All Analysed Fixtures</h2>
    <div id="matches" class="grid gap-4"></div>
    <section id="stats" class="mt-10"></section>
    <section id="archive" class="mt-10"></section>
  </main>
  <footer class="border-t border-gray-800 py-6 px-4 mt-12">
    <div class="max-w-4xl mx-auto text-center text-xs text-gray-600 space-y-1">
      <p id="visit-counter" class="text-gray-500"></p>
      <p data-i18n="disclaimer">For informational purposes only. Not financial advice. Please gamble responsibly.</p>
    </div>
  </footer>
</body>
</html>
